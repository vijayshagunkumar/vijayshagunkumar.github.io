name: Publish Portfolio Staging

on:
  workflow_dispatch:
  push:
    branches:
      - source

permissions:
  contents: write

concurrency:
  group: publish-portfolio-staging
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: source
          path: source

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: source/package-lock.json

      - name: Install dependencies
        working-directory: source
        run: npm ci

      - name: Build staging
        working-directory: source
        run: npm run build:staging

      - name: Checkout main static branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-site

      - name: Publish staging to main
        shell: bash
        run: |
          shopt -s extglob dotglob
          cd main-site
          rm -rf staging
          mkdir -p staging
          cp -R ../source/dist/. staging/
          touch .nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A staging .nojekyll
          if git diff --cached --quiet; then
            echo "No staging changes to publish to main."
          else
            git commit -m "Publish portfolio staging"
            git push origin main
          fi

      - name: Checkout gh-pages static branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-site

      - name: Publish staging to gh-pages
        shell: bash
        run: |
          shopt -s extglob dotglob
          cd gh-pages-site
          rm -rf staging
          mkdir -p staging
          cp -R ../source/dist/. staging/
          touch .nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A staging .nojekyll
          if git diff --cached --quiet; then
            echo "No staging changes to publish to gh-pages."
          else
            git commit -m "Publish portfolio staging"
            git push origin gh-pages
          fi
