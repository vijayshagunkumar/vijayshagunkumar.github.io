name: Publish Portfolio

on:
  workflow_dispatch:
  push:
    branches:
      - source

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: source

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to main
        run: npx gh-pages -d dist -b main -u "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish to gh-pages
        run: npx gh-pages -d dist -b gh-pages -u "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
        env:
          GH_TOKEN: ${{ github.token }}
